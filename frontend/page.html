<!DOCTYPE html>
<html>
<head>
  <title>Gemini Image Upload</title>
</head>
<body>
  <h2>Upload an Image to Gemini</h2>

  <form id="imageForm" enctype="multipart/form-data">
    <input type="file" name="image" required />
    <button type="submit">Upload</button>
  </form>

  <h3>Gemini Response:</h3>
  <pre id="responseText">No response yet.</pre>

  <script>
    const form = document.getElementById('imageForm');
    const responseText = document.getElementById('responseText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);

      try {
        const res = await fetch('http://localhost:5000/ask-photo', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();
        responseText.textContent = data.reply || data.error || "No response.";
      } catch (err) {
        console.error(err);
        responseText.textContent = 'Something went wrong.';
      }
    });
  </script>
</body>
</html>
